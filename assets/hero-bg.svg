<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a3a" />
      <stop offset="55%" stop-color="#0a0f1f" />
      <stop offset="100%" stop-color="#050609" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f61f1" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#1f61f1" stop-opacity="0" />
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#skyGrad)" />
  <circle cx="1350" cy="200" r="260" fill="url(#glow)" filter="url(#soft)" />
  <circle cx="250" cy="650" r="220" fill="#1a388e" opacity="0.25" filter="url(#soft)" />

  <!-- faint skyline silhouette -->
  <g fill="#0f1830" opacity="0.9">
    <rect x="0" y="640" width="90" height="260" />
    <rect x="100" y="560" width="70" height="340" />
    <rect x="180" y="620" width="60" height="280" />
    <rect x="250" y="500" width="100" height="400" />
    <rect x="360" y="600" width="80" height="300" />
    <rect x="450" y="540" width="60" height="360" />
    <rect x="520" y="590" width="90" height="310" />
    <rect x="620" y="470" width="70" height="430" />
    <rect x="700" y="610" width="100" height="290" />
    <rect x="810" y="530" width="60" height="370" />
    <rect x="880" y="580" width="90" height="320" />
    <rect x="980" y="500" width="70" height="400" />
    <rect x="1060" y="620" width="100" height="280" />
    <rect x="1170" y="560" width="60" height="340" />
    <rect x="1240" y="600" width="90" height="300" />
    <rect x="1340" y="520" width="70" height="380" />
    <rect x="1420" y="600" width="100" height="300" />
    <rect x="1530" y="560" width="70" height="340" />
  </g>

  <!-- subtle grid lines for texture -->
  <g stroke="#1f61f1" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="150" x2="1600" y2="150" />
    <line x1="0" y1="300" x2="1600" y2="300" />
    <line x1="0" y1="450" x2="1600" y2="450" />
  </g>

  <rect width="1600" height="900" fill="#000000" opacity="0.28" />
</svg>
